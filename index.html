<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#fff0f6" />
<title>語音翻譯 · Pink Voice</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow">
    <span class="blob blob1"></span>
    <span class="blob blob2"></span>
    <span class="blob blob3"></span>

    <svg class="deco balloon balloon1" viewBox="0 0 60 110" xmlns="http://www.w3.org/2000/svg">
      <path d="M30 62 C 24 72, 36 80, 30 100" stroke="#e6397a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <polygon points="26,58 34,58 30,66" fill="#e6397a"/>
      <ellipse cx="30" cy="32" rx="26" ry="32" fill="#ff8fc7"/>
      <ellipse cx="21" cy="18" rx="6" ry="9" fill="#ffffff" opacity="0.45"/>
    </svg>

    <svg class="deco balloon balloon2" viewBox="0 0 60 110" xmlns="http://www.w3.org/2000/svg">
      <path d="M30 62 C 36 72, 24 80, 30 100" stroke="#c22668" stroke-width="2" fill="none" stroke-linecap="round"/>
      <polygon points="26,58 34,58 30,66" fill="#c22668"/>
      <ellipse cx="30" cy="32" rx="24" ry="30" fill="#ffb8db"/>
      <ellipse cx="22" cy="18" rx="5" ry="8" fill="#ffffff" opacity="0.45"/>
    </svg>

    <svg class="deco balloon balloon3" viewBox="0 0 60 110" xmlns="http://www.w3.org/2000/svg">
      <path d="M30 62 C 24 72, 36 80, 30 100" stroke="#f8549a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <polygon points="26,58 34,58 30,66" fill="#f8549a"/>
      <ellipse cx="30" cy="32" rx="22" ry="27" fill="#ffd6ea"/>
      <ellipse cx="21" cy="16" rx="5" ry="7" fill="#ffffff" opacity="0.5"/>
    </svg>

    <svg class="deco bear bear-left" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="20" r="14" fill="#f0c9a0"/>
      <circle cx="76" cy="20" r="14" fill="#f0c9a0"/>
      <circle cx="24" cy="20" r="7" fill="#ffdcef"/>
      <circle cx="76" cy="20" r="7" fill="#ffdcef"/>
      <circle cx="50" cy="48" r="34" fill="#f6d7ae"/>
      <circle cx="37" cy="45" r="3.6" fill="#5a2246"/>
      <circle cx="63" cy="45" r="3.6" fill="#5a2246"/>
      <circle cx="29" cy="58" r="5.5" fill="#ff94c8" opacity="0.6"/>
      <circle cx="71" cy="58" r="5.5" fill="#ff94c8" opacity="0.6"/>
      <ellipse cx="50" cy="58" rx="15" ry="11" fill="#fff3e2"/>
      <ellipse cx="50" cy="54" rx="4.2" ry="3.2" fill="#5a2246"/>
      <path d="M50 57 v4 M50 61 q-5 5 -9 2 M50 61 q5 5 9 2" stroke="#5a2246" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </svg>

    <svg class="deco bear bear-right" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="20" r="13" fill="#f6d7ae"/>
      <circle cx="76" cy="20" r="13" fill="#f6d7ae"/>
      <circle cx="24" cy="20" r="6.5" fill="#ffdcef"/>
      <circle cx="76" cy="20" r="6.5" fill="#ffdcef"/>
      <circle cx="50" cy="47" r="32" fill="#f9e2bf"/>
      <circle cx="38" cy="44" r="3.4" fill="#5a2246"/>
      <circle cx="62" cy="44" r="3.4" fill="#5a2246"/>
      <circle cx="30" cy="56" r="5" fill="#ff94c8" opacity="0.6"/>
      <circle cx="70" cy="56" r="5" fill="#ff94c8" opacity="0.6"/>
      <ellipse cx="50" cy="56" rx="14" ry="10" fill="#fff3e2"/>
      <ellipse cx="50" cy="52" rx="4" ry="3" fill="#5a2246"/>
      <path d="M50 55 v3.5 M50 58.5 q-4.5 4.5 -8 1.8 M50 58.5 q4.5 4.5 8 1.8" stroke="#5a2246" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <header class="topbar">
    <div class="logo">
      <span class="logo-emoji" aria-hidden="true">🌸</span>
      語音翻譯
    </div>
    <button class="lang-badge" id="langBadge" aria-haspopup="dialog">
      <span id="langBadgeText">中日 · VOICE</span>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </header>

  <main class="stage">
    <div class="lang-pair">
      <button class="lang-pill" id="sourceLangBtn" data-role="source">中文</button>
      <button class="swap-btn" id="swapBtn" title="交換語言" aria-label="交換語言">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M7 7h11l-3-3M17 17H6l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="lang-pill" id="targetLangBtn" data-role="target">日文</button>
    </div>

    <div class="mode-toggle" role="tablist">
      <button class="mode-btn active" id="voiceModeBtn" role="tab" aria-selected="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 15a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 1 0-7 0v5.5A3.5 3.5 0 0 0 12 15Z" stroke="currentColor" stroke-width="1.8"/><path d="M6.5 11a5.5 5.5 0 0 0 11 0M12 18.5V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        語音輸入
      </button>
      <button class="mode-btn" id="textModeBtn" role="tab" aria-selected="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        文字輸入
      </button>
      <button class="mode-btn" id="convoModeBtn" role="tab" aria-selected="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 5h13a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H9l-4 3v-3H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
        即時對話
      </button>
    </div>

    <div class="mic-wrap" id="voicePanel">
      <div class="mic-ring ring1"></div>
      <div class="mic-ring ring2"></div>
      <button class="mic-btn" id="micBtn" aria-label="開始說話">
        <svg viewBox="0 0 24 24" width="34" height="34" fill="none">
          <path d="M12 15a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 1 0-7 0v5.5A3.5 3.5 0 0 0 12 15Z" stroke="currentColor" stroke-width="1.7"/>
          <path d="M6.5 11a5.5 5.5 0 0 0 11 0M12 18.5V21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="text-panel" id="textPanel" hidden>
      <textarea id="textInput" class="text-input" rows="3" placeholder="輸入文字後按翻譯…"></textarea>
      <button class="translate-btn" id="translateBtn">
        翻譯
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <p class="status" id="statusText">點擊下方麥克風開始</p>
    <p class="hint" id="hintText">選擇語言對，說話即自動翻譯並朗讀</p>

    <section class="transcript" id="transcript" hidden>
      <div class="bubble original">
        <span class="bubble-label" id="origLabel">中文</span>
        <p id="origText"></p>
      </div>
      <div class="bubble translated">
        <span class="bubble-label" id="transLabel">日文</span>
        <p id="transText"></p>
        <button class="replay-btn" id="replayBtn" aria-label="重新播放語音">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M11 5 6 9H3v6h3l5 4V5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M16 8a5 5 0 0 1 0 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
    </section>

    <section class="convo-panel" id="convoPanel" hidden>
      <button class="convo-turn" id="convoTurnLabel" title="點擊可手動切換說話方">
        🎤 輪到 <span id="convoTurnLangName">中文</span> 說話
      </button>

      <div class="convo-feed" id="convoFeed">
        <p class="convo-empty" id="convoEmpty">點擊下方麥克風，開始雙語即時對話吧！</p>
      </div>

      <div class="mic-wrap" id="convoMicWrap">
        <div class="mic-ring ring1"></div>
        <div class="mic-ring ring2"></div>
        <button class="mic-btn" id="convoMic" aria-label="開始對話">
          <svg viewBox="0 0 24 24" width="34" height="34" fill="none">
            <path d="M12 15a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 1 0-7 0v5.5A3.5 3.5 0 0 0 12 15Z" stroke="currentColor" stroke-width="1.7"/>
            <path d="M6.5 11a5.5 5.5 0 0 0 11 0M12 18.5V21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </section>

    <section class="history" id="history" hidden>
      <div class="history-head">
        <span>歷史紀錄</span>
        <button id="clearHistoryBtn">清除</button>
      </div>
      <ul id="historyList"></ul>
    </section>
  </main>

  <div class="modal-overlay" id="langModal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <h3>選擇語言 💗</h3>
      <p class="modal-sub" id="modalSub">選擇「來源」語言</p>
      <ul class="lang-list" id="langList"></ul>
      <button class="modal-close" id="modalClose">取消</button>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
